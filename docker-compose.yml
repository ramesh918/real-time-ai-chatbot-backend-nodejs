version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot_postgres
    environment:
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: chatbot_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatbot_user -d chatbot_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot_api
    environment:
      NODE_ENV: development
      API_HOST: 0.0.0.0
      API_PORT: 3000
      WS_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chatbot_user
      DB_PASSWORD: changeme
      DB_NAME: chatbot_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: development-secret-key
      JWT_REFRESH_SECRET: development-refresh-secret
    ports:
      - '3000:3000'
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
